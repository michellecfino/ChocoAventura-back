services:
  postgres:
    image: postgres:16
    container_name: chocoaventura-postgres
    environment:
      POSTGRES_DB: chocoaventura_db
      POSTGRES_USER: choco
      POSTGRES_PASSWORD: lala
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: chocoaventura-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@chocoaventura.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data: